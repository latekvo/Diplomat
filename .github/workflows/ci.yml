name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Newer pushes to the same ref supersede in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The macOS app + shared core. `swift build` compiles every target (incl. the
  # SwiftUI/AppKit `Diplomat` app); the smoke binary then asserts the shared
  # core logic (filters, prompt assembly, PR-reference parsing, conflict prompts).
  swift-macos:
    name: Swift (macOS) · build + core smoke
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - run: swift --version
      - name: Build all targets
        run: swift build
      - name: Run shared-core smoke test
        run: swift run DiplomatCoreSmoke
      # Headless UI snapshot: renders the real two-column panel (seeded sessions,
      # devices, bans, audit feed) through ImageRenderer — a cheap whole-UI crash
      # guard that needs no gh auth and no display. Render mode never persists
      # (settings writes are render-guarded), so it can't touch any defaults.
      - name: Headless panel render
        run: |
          DIPLOMAT_RENDER=devices DIPLOMAT_RENDER_OUT="$RUNNER_TEMP/panel.png" \
            swift run Diplomat
          test -s "$RUNNER_TEMP/panel.png"

  # The shared core advertises "compiles on macOS *and* Linux". This guards that
  # invariant by building + running only the platform-agnostic core/smoke targets
  # (the SwiftUI app target is macOS-only and is intentionally not built here).
  swift-core-linux:
    name: Swift core (Linux) · cross-platform smoke
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v7
      - run: swift --version
      - name: Build + run shared-core smoke test
        run: swift run DiplomatCoreSmoke
      # Build the static, portable diplomat-core CLI and hand it to the python-linux
      # job. The Python front-end shells out to this binary for every prompt, so
      # its pytest suite needs it present; building it here (once, in the Swift
      # container) keeps the Swift<->Python golden parity provable in CI.
      - name: Build diplomat-core CLI (static, portable)
        run: |
          swift build --product diplomat-core --static-swift-stdlib -c release
          bin="$(swift build --product diplomat-core --static-swift-stdlib -c release --show-bin-path)"
          mkdir -p artifact
          cp "$bin/diplomat-core" artifact/diplomat-core
      - name: Upload diplomat-core binary
        uses: actions/upload-artifact@v4
        with:
          name: diplomat-core-linux
          path: artifact/diplomat-core

  # The Linux (Qt6/PySide6) front-end. Offline, headless regression tests over the
  # same shared-core logic the GUI renders.
  python-linux:
    name: Python (Linux) · pytest
    runs-on: ubuntu-latest
    # The prompt tests shell out to diplomat-core; take the static binary the
    # swift-core-linux job built rather than installing a Swift toolchain here.
    needs: swift-core-linux
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: linux/requirements.txt
      # Qt needs these shared libs present even under the offscreen platform plugin.
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r linux/requirements.txt pytest
      - name: Download diplomat-core binary
        uses: actions/download-artifact@v4
        with:
          name: diplomat-core-linux
          path: core-bin
      - name: Make diplomat-core executable
        run: chmod +x core-bin/diplomat-core
      - name: Run tests (headless Qt)
        env:
          QT_QPA_PLATFORM: offscreen
          DIPLOMAT_CORE_BIN: ${{ github.workspace }}/core-bin/diplomat-core
        run: pytest linux/tests -q

  # The device-allocator MCP server + daemon. Self-contained Node tests that drive
  # the allocator over its unix socket against a synthetic device pool (DA_FAKE_DEVICES),
  # so they need no real simulators/emulators and run on Linux.
  node-device-allocator:
    name: Node (device allocator) · daemon + MCP tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: device-allocator
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: device-allocator/package-lock.json
      # Strict `npm ci` only: the old `|| npm install` fallback silently degraded a
      # broken/stale lockfile into a non-reproducible install.
      - name: Install dependencies
        run: npm ci
      - name: Allocation logic (request/change/broken/reap/idle)
        run: node test/integration.mjs
      - name: Daemon singleton survives a stale-socket startup race
        run: node test/daemon-singleton-race.mjs
      - name: MCP protocol (handshake/tools/alwaysLoad/allocate)
        run: node test/mcp-protocol.mjs
      - name: Agent-kill on prompt injection
        run: node test/agent-kill.mjs
      - name: Agent-kill spares a reparent supervisor
        run: node test/agent-kill-spares-supervisor.mjs
      - name: Report-injection capture stays off the event loop
        run: node test/report-injection-nonblocking.mjs
      - name: Report-injection evidence survives UTF-8 round-trip
        run: node test/report-injection-utf8.mjs
      - name: Idle sweep spares a device quarantined into repairing
        run: node test/idle-sweep-repairing-race.mjs
      - name: Repair completion re-checks allocation identity
        run: node test/repair-completion-identity.mjs
      - name: Device-id claim leases a still-booting device
        run: node test/deviceid-claim-booting-lease.mjs
      - name: Android wipe shuts a running instance down before erasing
        run: node test/android-wipe-shuts-down-running-instance.mjs
      - name: Android wipe fails honestly when the AVD lock never releases
        run: node test/android-wipe-fails-when-lock-never-releases.mjs
