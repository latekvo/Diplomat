name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Newer pushes to the same ref supersede in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The macOS app + shared core. `swift build` compiles every target (incl. the
  # SwiftUI/AppKit `ArgentUtils` app); the smoke binary then asserts the shared
  # core logic (filters, prompt assembly, PR-reference parsing, conflict prompts).
  swift-macos:
    name: Swift (macOS) · build + core smoke
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - run: swift --version
      - name: Build all targets
        run: swift build
      - name: Run shared-core smoke test
        run: swift run ArgentUtilsCoreSmoke
      # Headless UI snapshot: renders the real two-column panel (seeded sessions,
      # devices, bans, audit feed) through ImageRenderer — a cheap whole-UI crash
      # guard that needs no gh auth and no display. Render mode never persists
      # (settings writes are render-guarded), so it can't touch any defaults.
      - name: Headless panel render
        run: |
          ARGENT_UTILS_RENDER=devices ARGENT_UTILS_RENDER_OUT="$RUNNER_TEMP/panel.png" \
            swift run ArgentUtils
          test -s "$RUNNER_TEMP/panel.png"

  # The shared core advertises "compiles on macOS *and* Linux". This guards that
  # invariant by building + running only the platform-agnostic core/smoke targets
  # (the SwiftUI app target is macOS-only and is intentionally not built here).
  swift-core-linux:
    name: Swift core (Linux) · cross-platform smoke
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v7
      - run: swift --version
      - name: Build + run shared-core smoke test
        run: swift run ArgentUtilsCoreSmoke

  # The Linux (Qt6/PySide6) front-end. Offline, headless regression tests over the
  # same shared-core logic the GUI renders.
  python-linux:
    name: Python (Linux) · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: linux/requirements.txt
      # Qt needs these shared libs present even under the offscreen platform plugin.
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r linux/requirements.txt pytest
      - name: Run tests (headless Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest linux/tests -q

  # The device-allocator MCP server + daemon. Self-contained Node tests that drive
  # the allocator over its unix socket against a synthetic device pool (DA_FAKE_DEVICES),
  # so they need no real simulators/emulators and run on Linux.
  node-device-allocator:
    name: Node (device allocator) · daemon + MCP tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: device-allocator
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: device-allocator/package-lock.json
      # Strict `npm ci` only: the old `|| npm install` fallback silently degraded a
      # broken/stale lockfile into a non-reproducible install.
      - name: Install dependencies
        run: npm ci
      - name: Allocation logic (request/change/broken/reap/idle)
        run: node test/integration.mjs
      - name: MCP protocol (handshake/tools/alwaysLoad/allocate)
        run: node test/mcp-protocol.mjs
      - name: Agent-kill on prompt injection
        run: node test/agent-kill.mjs
