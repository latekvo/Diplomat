name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Newer pushes to the same ref supersede in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The macOS app + shared core. `swift build` compiles every target (incl. the
  # SwiftUI/AppKit `ArgentUtils` app); the smoke binary then asserts the shared
  # core logic (filters, prompt assembly, PR-reference parsing, conflict prompts).
  swift-macos:
    name: Swift (macOS) · build + core smoke
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - run: swift --version
      - name: Build all targets
        run: swift build
      - name: Run shared-core smoke test
        run: swift run ArgentUtilsCoreSmoke

  # The shared core advertises "compiles on macOS *and* Linux". This guards that
  # invariant by building + running only the platform-agnostic core/smoke targets
  # (the SwiftUI app target is macOS-only and is intentionally not built here).
  swift-core-linux:
    name: Swift core (Linux) · cross-platform smoke
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v7
      - run: swift --version
      - name: Build + run shared-core smoke test
        run: swift run ArgentUtilsCoreSmoke

  # The Linux (Qt6/PySide6) front-end. Offline, headless regression tests over the
  # same shared-core logic the GUI renders.
  python-linux:
    name: Python (Linux) · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: linux/requirements.txt
      # Qt needs these shared libs present even under the offscreen platform plugin.
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r linux/requirements.txt pytest
      - name: Run tests (headless Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest linux/tests -q
