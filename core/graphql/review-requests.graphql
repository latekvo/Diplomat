# PRs that request MY review (search qualifier in $q), with the timestamps needed
# to decide whether I still owe a review: the latest "review requested from me"
# event vs my latest review submission.
#
# $withFiles pulls each PR's changed paths — used ONLY to gate the auto-review
# verdict (skill/installer withhold), which is off by default, and a big slice of
# the query's rate-limit cost — so callers pass false unless auto-approvals are on.
# The `first:`/`last:` caps are kept tight for the same rate-limit reason.
query ($q: String!, $withFiles: Boolean!) {
  search(query: $q, type: ISSUE, first: 30) {
    nodes {
      ... on PullRequest {
        number
        title
        url
        author { login }
        authorAssociation
        headRefOid
        files(first: 60) @include(if: $withFiles) { nodes { path } }
        timelineItems(itemTypes: [REVIEW_REQUESTED_EVENT], last: 15) {
          nodes { ... on ReviewRequestedEvent {
            createdAt
            requestedReviewer { __typename ... on User { login } }
          } }
        }
        reviews(last: 15) { nodes { author { login } submittedAt } }
      }
    }
  }
}
